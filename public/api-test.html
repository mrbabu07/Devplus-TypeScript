<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevPlus API Console</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --panel: #ffffff;
        --text: #172033;
        --muted: #5f6c80;
        --line: #d8dee9;
        --primary: #2563eb;
        --primary-dark: #1d4ed8;
        --danger: #dc2626;
        --danger-dark: #b91c1c;
        --ok: #15803d;
        --code: #111827;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      .shell {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: clamp(24px, 3vw, 34px);
        font-weight: 750;
        letter-spacing: 0;
      }

      .token-state {
        min-width: 120px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 9px 12px;
        color: var(--muted);
        text-align: center;
      }

      .token-state.active {
        color: var(--ok);
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(320px, 420px);
        gap: 18px;
        align-items: start;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 18px;
      }

      .stack {
        display: grid;
        gap: 18px;
      }

      .section-title {
        margin: 0 0 14px;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .full {
        grid-column: 1 / -1;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 650;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #ffffff;
        color: var(--text);
        padding: 10px 11px;
        outline: none;
      }

      textarea {
        min-height: 92px;
        resize: vertical;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }

      button {
        min-height: 40px;
        border: 0;
        border-radius: 6px;
        background: var(--primary);
        color: #ffffff;
        padding: 9px 14px;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: var(--primary-dark);
      }

      button.secondary {
        border: 1px solid var(--line);
        background: #ffffff;
        color: var(--text);
      }

      button.secondary:hover {
        background: #f1f5f9;
      }

      button.danger {
        background: var(--danger);
      }

      button.danger:hover {
        background: var(--danger-dark);
      }

      .output {
        position: sticky;
        top: 18px;
      }

      pre {
        min-height: 380px;
        max-height: calc(100vh - 150px);
        margin: 0;
        overflow: auto;
        border-radius: 8px;
        background: var(--code);
        color: #d1d5db;
        padding: 16px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
      }

      @media (max-width: 880px) {
        .topbar,
        .grid {
          grid-template-columns: 1fr;
        }

        .topbar {
          align-items: stretch;
        }

        .token-state {
          text-align: left;
        }

        .output {
          position: static;
        }

        pre {
          max-height: 520px;
        }
      }

      @media (max-width: 620px) {
        .shell {
          width: min(100% - 20px, 1180px);
          padding: 18px 0;
        }

        .form-grid {
          grid-template-columns: 1fr;
        }

        .panel {
          padding: 14px;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="topbar">
        <h1>DevPlus API Console</h1>
        <div id="tokenState" class="token-state">No token</div>
      </div>

      <div class="grid">
        <div class="stack">
          <section class="panel">
            <h2 class="section-title">Auth</h2>
            <div class="form-grid">
              <label>
                Name
                <input id="signupName" value="John Doe" />
              </label>
              <label>
                Signup Email
                <input id="signupEmail" value="john1@devpulse.com" />
              </label>
              <label>
                Password
                <input id="signupPassword" value="securePassword123" type="password" />
              </label>
              <label>
                Role
                <select id="signupRole">
                  <option value="contributor">contributor</option>
                  <option value="maintainer">maintainer</option>
                </select>
              </label>
              <label>
                Login Email
                <input id="loginEmail" value="john1@devpulse.com" />
              </label>
              <label>
                Login Password
                <input id="loginPassword" value="securePassword123" type="password" />
              </label>
            </div>
            <div class="actions">
              <button id="signupBtn">Signup</button>
              <button id="loginBtn">Login</button>
              <button id="clearTokenBtn" class="secondary">Clear Token</button>
            </div>
          </section>

          <section class="panel">
            <h2 class="section-title">Issues</h2>
            <div class="form-grid">
              <label>
                Title
                <input id="issueTitle" value="Database connection timeout" />
              </label>
              <label>
                Type
                <select id="issueType">
                  <option value="bug">bug</option>
                  <option value="feature_request">feature_request</option>
                </select>
              </label>
              <label class="full">
                Description
                <textarea id="issueDescription">Pool exhausts after many concurrent queries and causes server errors.</textarea>
              </label>
            </div>
            <div class="actions">
              <button id="createIssueBtn">Create Issue</button>
              <button id="getIssuesBtn" class="secondary">Get Issues</button>
            </div>
          </section>

          <section class="panel">
            <h2 class="section-title">Find And Filter</h2>
            <div class="form-grid">
              <label>
                Sort
                <select id="sort">
                  <option value="newest">newest</option>
                  <option value="oldest">oldest</option>
                </select>
              </label>
              <label>
                Filter Type
                <select id="filterType">
                  <option value="">all</option>
                  <option value="bug">bug</option>
                  <option value="feature_request">feature_request</option>
                </select>
              </label>
              <label>
                Filter Status
                <select id="filterStatus">
                  <option value="">all</option>
                  <option value="open">open</option>
                  <option value="in_progress">in_progress</option>
                  <option value="resolved">resolved</option>
                </select>
              </label>
              <label>
                Issue ID
                <input id="issueId" value="1" />
              </label>
            </div>
            <div class="actions">
              <button id="filterBtn" class="secondary">Apply Filter</button>
              <button id="getSingleBtn" class="secondary">Get Single</button>
            </div>
          </section>

          <section class="panel">
            <h2 class="section-title">Update</h2>
            <div class="form-grid">
              <label>
                Update Title
                <input id="updateTitle" value="Updated database pool issue" />
              </label>
              <label>
                Update Type
                <select id="updateType">
                  <option value="bug">bug</option>
                  <option value="feature_request">feature_request</option>
                </select>
              </label>
              <label>
                Status
                <select id="updateStatus">
                  <option value="open">open</option>
                  <option value="in_progress">in_progress</option>
                  <option value="resolved">resolved</option>
                </select>
              </label>
              <label class="full">
                Update Description
                <textarea id="updateDescription">Updated description with reproduction steps and expected behavior.</textarea>
              </label>
            </div>
            <div class="actions">
              <button id="updateIssueBtn">Update Issue</button>
              <button id="updateStatusBtn" class="secondary">Update Status</button>
              <button id="deleteIssueBtn" class="danger">Delete Issue</button>
            </div>
          </section>
        </div>

        <aside class="panel output">
          <h2 class="section-title">Response</h2>
          <pre id="response">Ready</pre>
        </aside>
      </div>
    </main>

    <script>
      const responseBox = document.getElementById("response");
      const tokenState = document.getElementById("tokenState");
      let token = localStorage.getItem("devplus_token") || "";

      const value = (id) => document.getElementById(id).value;

      const setResponse = (data) => {
        responseBox.textContent = JSON.stringify(data, null, 2);
      };

      const setToken = (newToken) => {
        token = newToken || "";

        if (token) {
          localStorage.setItem("devplus_token", token);
          tokenState.textContent = "Token saved";
          tokenState.classList.add("active");
          return;
        }

        localStorage.removeItem("devplus_token");
        tokenState.textContent = "No token";
        tokenState.classList.remove("active");
      };

      const request = async (path, options = {}) => {
        const headers = {
          ...(options.body ? { "Content-Type": "application/json" } : {}),
          ...(options.auth ? { Authorization: token } : {}),
        };

        const res = await fetch(path, {
          ...options,
          headers,
        });

        const data = await res.json();
        setResponse({
          status: res.status,
          data,
        });

        return data;
      };

      const queryString = () => {
        const params = new URLSearchParams();
        params.set("sort", value("sort"));

        if (value("filterType")) {
          params.set("type", value("filterType"));
        }

        if (value("filterStatus")) {
          params.set("status", value("filterStatus"));
        }

        return params.toString();
      };

      document.getElementById("signupBtn").addEventListener("click", async () => {
        await request("/api/auth/signup", {
          method: "POST",
          body: JSON.stringify({
            name: value("signupName"),
            email: value("signupEmail"),
            password: value("signupPassword"),
            role: value("signupRole"),
          }),
        });
      });

      document.getElementById("loginBtn").addEventListener("click", async () => {
        const data = await request("/api/auth/login", {
          method: "POST",
          body: JSON.stringify({
            email: value("loginEmail"),
            password: value("loginPassword"),
          }),
        });

        if (data.success && data.data?.token) {
          setToken(data.data.token);
        }
      });

      document.getElementById("clearTokenBtn").addEventListener("click", () => {
        setToken("");
        setResponse({
          success: true,
          message: "Token cleared",
        });
      });

      document.getElementById("createIssueBtn").addEventListener("click", async () => {
        await request("/api/issues", {
          method: "POST",
          auth: true,
          body: JSON.stringify({
            title: value("issueTitle"),
            description: value("issueDescription"),
            type: value("issueType"),
          }),
        });
      });

      document.getElementById("getIssuesBtn").addEventListener("click", async () => {
        await request("/api/issues");
      });

      document.getElementById("filterBtn").addEventListener("click", async () => {
        await request(`/api/issues?${queryString()}`);
      });

      document.getElementById("getSingleBtn").addEventListener("click", async () => {
        await request(`/api/issues/${value("issueId")}`);
      });

      document.getElementById("updateIssueBtn").addEventListener("click", async () => {
        await request(`/api/issues/${value("issueId")}`, {
          method: "PATCH",
          auth: true,
          body: JSON.stringify({
            title: value("updateTitle"),
            description: value("updateDescription"),
            type: value("updateType"),
          }),
        });
      });

      document.getElementById("updateStatusBtn").addEventListener("click", async () => {
        await request(`/api/issues/${value("issueId")}`, {
          method: "PATCH",
          auth: true,
          body: JSON.stringify({
            status: value("updateStatus"),
          }),
        });
      });

      document.getElementById("deleteIssueBtn").addEventListener("click", async () => {
        await request(`/api/issues/${value("issueId")}`, {
          method: "DELETE",
          auth: true,
        });
      });

      setToken(token);
    </script>
  </body>
</html>
